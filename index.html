<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>无人机空气动力学实验室</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
      #app { position: fixed; inset: 0; }
      #panel {
        position: fixed; top: 0; right: 0; width: 320px; height: 100%;
        background: rgba(20,22,28,.9); color: #eee; padding: 16px;
        overflow-y: auto; font-size: 14px; backdrop-filter: blur(6px);
      }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="panel"></div>
    <div id="airfoil-box" style="position:fixed;left:12px;bottom:12px;background:rgba(20,22,28,.9);
         border-radius:10px;padding:8px;backdrop-filter:blur(6px)">
      <div style="color:#cbd5e1;font-size:12px;margin:2px 4px 6px">桨叶剖面（迎角示意）</div>
      <canvas id="airfoil" width="240" height="150"></canvas>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
