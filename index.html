<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>无人机空气动力学实验室</title>
    <style>
      :root {
        --bg-app: #06070a;
        --bg-panel: rgba(10,12,17,.97);
        --bg-card: rgba(255,255,255,.035);
        --bg-card-hover: rgba(255,255,255,.065);
        --border: rgba(255,255,255,.09);
        --border-strong: rgba(255,255,255,.18);
        --text-primary: #e8ebf1;
        --text-secondary: #8791a6;
        --text-tertiary: #565f74;
        --accent: #38bdf8;
        --lift: #22c55e;
        --weight: #ef4444;
        --wind: #22d3ee;
        --downwash: #7dd3fc;
        --warn: #f59e0b;
        --radius: 10px;
        --radius-sm: 7px;
        --font-sans: ui-sans-serif, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        --font-mono: ui-monospace, "SFMono-Regular", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
      }
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: var(--bg-app); font-family: var(--font-sans); }
      #app { position: fixed; inset: 0; }

      #panel {
        position: fixed; top: 0; right: 0; width: 360px; height: 100%;
        background: var(--bg-panel); color: var(--text-primary); padding: 20px 18px 32px;
        overflow-y: auto; font-size: 13px; line-height: 1.5; backdrop-filter: blur(10px);
        border-left: 1px solid var(--border); z-index: 3;
        scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent;
      }
      #panel::-webkit-scrollbar { width: 8px; }
      #panel::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

      #panel .panel-header { margin: 0 0 20px; padding-top: 2px; }
      #panel .panel-title { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-primary); }
      #panel .panel-subtitle {
        font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase;
        color: var(--text-tertiary); margin-top: 5px;
      }

      #panel .card {
        background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 14px; margin-bottom: 14px;
      }
      #panel .card:last-child { margin-bottom: 0; }
      #panel .section-label {
        display: flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 10.5px;
        letter-spacing: .1em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px;
      }
      #panel .section-label::before {
        content: ''; width: 6px; height: 6px; border-radius: 50%; flex: none;
        background: var(--accent); box-shadow: 0 0 6px var(--accent);
      }

      #panel .field-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
      #panel .chip {
        display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 600;
        background: rgba(56,189,248,.12); color: var(--accent); border: 1px solid rgba(56,189,248,.3);
      }

      #panel select {
        width: 100%; background: var(--bg-card-hover); border: 1px solid var(--border); color: var(--text-primary);
        border-radius: var(--radius-sm); padding: 7px 8px; font-size: 13px; font-family: var(--font-sans);
      }
      #panel select:focus-visible, #panel input:focus-visible {
        outline: 2px solid var(--accent); outline-offset: 1px;
      }

      #panel .slider-row { margin: 12px 0; }
      #panel .slider-row:first-child { margin-top: 0; }
      #panel .slider-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
      #panel .slider-head .label { font-size: 12.5px; color: var(--text-secondary); }
      #panel .slider-value {
        font-family: var(--font-mono); font-size: 12.5px; font-weight: 600; font-variant-numeric: tabular-nums;
      }
      #panel input[type="range"] {
        width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
        background: var(--border-strong); border-radius: 2px; cursor: pointer;
      }
      #panel input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; width: 14px; height: 14px; margin-top: -5px; border-radius: 50%;
        background: var(--thumb-color, var(--accent)); border: 2px solid #06070a;
        box-shadow: 0 0 0 2px rgba(255,255,255,.07);
      }
      #panel input[type="range"]::-moz-range-thumb {
        width: 14px; height: 14px; border-radius: 50%; border: 2px solid #06070a;
        background: var(--thumb-color, var(--accent));
      }
      #panel input[type="range"]::-moz-range-track { height: 4px; background: transparent; border-radius: 2px; }

      #panel .legend-row { display: flex; align-items: center; gap: 9px; padding: 4px 0; font-size: 12.5px; color: var(--text-secondary); }
      #panel .legend-swatch {
        width: 13px; height: 13px; border-radius: 4px; flex: none;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,.15);
      }
      #panel .legend-note {
        margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);
        font-size: 11.5px; color: var(--text-tertiary); line-height: 1.6;
      }

      #panel .readout-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; font-size: 13px; color: var(--text-secondary); }
      #panel .readout-value {
        font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: var(--text-primary);
        font-variant-numeric: tabular-nums;
      }
      #panel .status-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 14px; }
      #panel .status-pill { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }

      #panel .ratio-block { margin-bottom: 2px; }
      #panel .ratio-label { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 7px; }
      #panel .ratio-label b { font-family: var(--font-mono); color: var(--text-primary); font-size: 12.5px; }
      #panel .ratio-gauge { position: relative; height: 14px; border-radius: 7px; overflow: hidden; margin-bottom: 14px; }
      #panel .ratio-zones {
        position: absolute; inset: 0;
        background: linear-gradient(to right, var(--weight) 0 58%, var(--warn) 58% 66.6%, var(--lift) 66.6% 100%);
        opacity: .25;
      }
      #panel .ratio-fill { position: absolute; inset: 0; width: 0; transition: width .12s ease, background-color .12s ease; }
      #panel .ratio-tick { position: absolute; top: -2px; bottom: -2px; width: 2px; left: 66.6%; background: var(--text-primary); opacity: .85; }
      #panel .ratio-tick::after {
        content: '1.0'; position: absolute; top: 17px; left: 50%; transform: translateX(-50%);
        font-size: 9.5px; font-family: var(--font-mono); color: var(--text-tertiary); white-space: nowrap;
      }

      #panel .material-note {
        margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
        font-size: 11.5px; color: var(--text-tertiary); line-height: 1.6;
      }
      #panel .material-note b { color: var(--text-secondary); }

      #panel .part-list { display: flex; flex-direction: column; gap: 4px; }
      #panel .part-btn {
        all: unset; box-sizing: border-box; display: block; width: 100%; padding: 7px 10px;
        border-radius: var(--radius-sm); font-size: 12.5px; color: var(--text-secondary); cursor: pointer;
        border: 1px solid transparent; transition: background .12s, color .12s, border-color .12s;
      }
      #panel .part-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
      #panel .part-btn.selected {
        background: rgba(56,189,248,.14); border-color: rgba(56,189,248,.4); color: var(--accent); font-weight: 600;
      }
      #panel .part-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

      #panel .part-info { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
      #panel .part-info-name { font-weight: 700; font-size: 13px; color: var(--text-primary); margin-bottom: 4px; }
      #panel .part-info-desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.6; }
      #panel .part-info-empty { font-size: 12.5px; color: var(--text-tertiary); }

      #airfoil-box, #aerochart-box {
        position: fixed; bottom: 12px; z-index: 2;
        background: var(--bg-panel); border: 1px solid var(--border);
        border-radius: 10px; padding: 10px; backdrop-filter: blur(10px);
      }
      #airfoil-box { left: 12px; }
      #aerochart-box { left: 472px; }
      .viz-title {
        color: var(--text-secondary); font-family: var(--font-mono); font-size: 11px;
        letter-spacing: .06em; text-transform: uppercase; margin: 2px 4px 8px;
      }
      canvas { display: block; }

      @media (max-width: 1280px) {
        #aerochart-box { display: none; }
      }
      @media (max-width: 820px) {
        #airfoil-box { display: none; }
      }
      @media (max-width: 760px) {
        #app { bottom: 55%; }
        #panel {
          top: auto; bottom: 0; width: 100%; height: 55%;
          border-left: 0; border-top: 1px solid var(--border);
          padding: 14px 14px 28px;
        }
        #panel .panel-header { margin-bottom: 14px; }
        #airfoil-box, #aerochart-box { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <aside id="panel" aria-label="无人机参数与读数"></aside>
    <section id="airfoil-box" aria-label="旋翼桨根变距图">
      <div class="viz-title">旋翼桨根变距</div>
      <canvas id="airfoil" width="420" height="260" role="img" aria-label="整片旋翼桨叶绕桨根长轴改变桨距的三维与轴向双视图"></canvas>
    </section>
    <section id="aerochart-box" aria-label="空气动力学曲线图">
      <div class="viz-title">空气动力学曲线（CL 与 L/D 随迎角）</div>
      <canvas id="aerochart" width="400" height="230" role="img" aria-label="升力系数和升阻比随迎角变化曲线"></canvas>
    </section>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
